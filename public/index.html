<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayBot SC88</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e2e8f0;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #111118;
    border: 1px solid #2d2d3d;
    border-radius: 12px;
    padding: 40px;
    max-width: 480px;
    width: 90%;
    text-align: center;
  }
  .dot { width: 10px; height: 10px; background: #22c55e;
         border-radius: 50%; display: inline-block;
         animation: pulse 2s infinite; margin-right: 8px; }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:.3; }
  }
  h1 { font-size: 1.4rem; color: #f1f5f9; margin-bottom: 8px; }
  p  { color: #64748b; font-size: 0.85rem; margin-bottom: 24px; }
  .cmd {
    background: #1e1e2e;
    border: 1px solid #2d2d3d;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.8rem;
    color: #94a3b8;
    text-align: left;
    margin-bottom: 12px;
  }
  .cmd span { color: #22c55e; }
  .links { margin-top: 24px; }
  .links a {
    color: #6366f1;
    text-decoration: none;
    font-size: 0.85rem;
    margin: 0 10px;
  }
  .links a:hover { color: #818cf8; }
</style>
</head>
<body>
<div class="card">
  <h1><span class="dot"></span>PayBot SC88</h1>
  <p>Telegram bot lấy thông tin thanh toán</p>

  <div class="cmd">
    <span>Lệnh bot:</span><br>
    /pay &nbsp;— Lấy thông tin tài khoản nạp<br>
    /nap &nbsp;— Như /pay<br>
    /help — Hướng dẫn
  </div>

  <div class="links">
    <a href="/api/setup">⚙ Setup Webhook</a>
  </div>
</div>
</body>
</html>
